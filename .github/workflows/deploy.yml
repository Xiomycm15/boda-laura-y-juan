name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - codex/beach-vibes-redesign
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build
        env:
          VITE_SUPABASE_URL: https://uxucchdfiawojxytscrj.supabase.co
          VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV4dWNjaGRmaWF3b2p4eXRzY3JqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzMzI2MTgsImV4cCI6MjA5NzkwODYxOH0.W5nQJnO4IxNz4TXQwIaMUtRet7vYdk6eBmIeeoWhEEo

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
